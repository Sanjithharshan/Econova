<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>City Map - EcoNova Solutions</title>
	<link rel="stylesheet" href="../assets/css/map.css">
	<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
	<div class="map-page">
		<header class="map-header">
			<a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
			<h1><i class="fas fa-map"></i> City Waste Map</h1>
			<p>All users can view bins. Admin & Municipal can add, delete, and update bins.</p>
		</header>

		<div class="map-container">
			<div id="map"></div>
			<div class="map-sidebar" id="mapSidebar">
				<div class="user-card" id="userCard">
					<h3>Your Location</h3>
					<p id="userAddress">Not set</p>
					<button class="btn" id="setAddressBtn"><i class="fas fa-location-dot"></i> Set / Update Address</button>
				</div>

				<div class="tools admin-only municipal-only" id="editTools" style="display:none;">
					<h3>Bin Tools</h3>
					<button class="btn primary" id="addBinBtn"><i class="fas fa-plus"></i> Add Bin</button>
					<button class="btn" id="toggleEditBtn"><i class="fas fa-pen"></i> Toggle Edit</button>
				</div>

				<div class="bins-list" id="binsList">
					<h3>All Bins</h3>
					<div id="binsContainer"></div>
				</div>
			</div>
		</div>
	</div>

	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
	<script src="../assets/js/map.js"></script>
</body>
</html>
