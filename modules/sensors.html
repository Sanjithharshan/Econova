<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Bin Sensors - EcoNova Solutions</title>
    <link rel="stylesheet" href="../assets/css/sensors.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="sensor-page">
        <!-- Header -->
        <header class="sensor-header">
            <div class="header-content">
                <div class="header-left">
                    <a href="dashboard.html" class="back-btn">
                        <i class="fas fa-arrow-left"></i> Back to Dashboard
                    </a>
                    <h1>
                        <i class="fas fa-microchip"></i>
                        Smart Bin Monitoring
                    </h1>
                    <p>Real-time IoT sensor data and bin status monitoring</p>
                </div>
                <div class="header-actions">
                    <button class="btn btn-primary" onclick="refreshData()">
                        <i class="fas fa-sync-alt"></i> Refresh Data
                    </button>
                    <button class="btn btn-secondary">
                        <i class="fas fa-download"></i> Export Report
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <div class="sensor-container">
            <!-- Alert Panel -->
            <div class="alert-panel" id="alertPanel">
                <div class="alert-content">
                    <i class="fas fa-exclamation-triangle"></i>
                    <div class="alert-text">
                        <strong>3 Critical Alerts</strong>
                        <p>Bins require immediate attention</p>
                    </div>
                    <button class="btn btn-small" onclick="viewAlerts()">View All</button>
                </div>
            </div>

            <!-- Stats Overview -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon" style="background: linear-gradient(135deg, #10b981, #34d399);">
                        <i class="fas fa-trash-alt"></i>
                    </div>
                    <div class="stat-details">
                        <h3>Total Bins</h3>
                        <p class="stat-value">24</p>
                        <span class="stat-change positive">
                            <i class="fas fa-arrow-up"></i> +2 this month
                        </span>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon" style="background: linear-gradient(135deg, #f59e0b, #fbbf24);">
                        <i class="fas fa-exclamation-circle"></i>
                    </div>
                    <div class="stat-details">
                        <h3>Full Bins</h3>
                        <p class="stat-value" style="color: #f59e0b;">7</p>
                        <span class="stat-change negative">
                            <i class="fas fa-arrow-down"></i> -3 today
                        </span>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon" style="background: linear-gradient(135deg, #06b6d4, #22d3ee);">
                        <i class="fas fa-battery-three-quarters"></i>
                    </div>
                    <div class="stat-details">
                        <h3>Avg Battery</h3>
                        <p class="stat-value">78%</p>
                        <span class="stat-change neutral">
                            <i class="fas fa-arrows-alt-h"></i> Stable
                        </span>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon" style="background: linear-gradient(135deg, #8b5cf6, #a78bfa);">
                        <i class="fas fa-thermometer-half"></i>
                    </div>
                    <div class="stat-details">
                        <h3>Avg Temperature</h3>
                        <p class="stat-value">32°C</p>
                        <span class="stat-change neutral">Normal range</span>
                    </div>
                </div>
            </div>

            <!-- Filters and Search -->
            <div class="controls-bar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search by location or ID..." id="searchInput">
                </div>
                <div class="filter-group">
                    <select class="filter-select" id="statusFilter">
                        <option value="all">All Status</option>
                        <option value="critical">Critical (>90%)</option>
                        <option value="warning">Warning (>75%)</option>
                        <option value="normal">Normal</option>
                    </select>
                    <select class="filter-select" id="zoneFilter">
                        <option value="all">All Zones</option>
                        <option value="north">North Zone</option>
                        <option value="south">South Zone</option>
                        <option value="east">East Zone</option>
                        <option value="west">West Zone</option>
                        <option value="central">Central Zone</option>
                    </select>
                </div>
            </div>

            <!-- Bin List -->
            <div class="bins-container" id="binsContainer">
                <!-- Bin cards will be generated by JavaScript -->
            </div>
        </div>
    </div>

    <!-- Bin Detail Modal -->
    <div class="modal" id="binModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Bin Details</h2>
                <button class="close-btn" onclick="closeBinModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body" id="binDetails">
                <!-- Details will be loaded here -->
            </div>
        </div>
    </div>

    <script src="../assets/js/sensors.js"></script>
</body>
</html>
